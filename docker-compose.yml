version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cdr-analyzer-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: always
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - cdr-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cdr-analyzer-frontend
    ports:
      - "3000:3000"
    volumes:
      - .:/app
      - /app/node_modules
    depends_on:
      - backend
    environment:
      # URL interna para el proxy de Node.js (server.ts)
      - BACKEND_URL=http://backend:8000
      # Variable para Vite (se inyecta en el cliente)
      # NOTA: Si accedes desde el navegador, 'backend' no se resolverá.
      # Se recomienda usar '/api' para que pase por el proxy de Node.js.
      - VITE_API_BASE_URL=/api
    restart: always
    networks:
      - cdr-network

networks:
  cdr-network:
    driver: bridge
